<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0a1020; color:#c8d0de; }
.widget { max-width:600px; border:1px solid #152040; border-radius:12px; overflow:hidden; }
.widget-header { padding:16px 20px; background:#0d1528; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #152040; }
.widget-title { font-size:14px; font-weight:700; color:#fff; }
.widget-badge { font-size:10px; color:#4a8fe7; text-decoration:none; font-weight:600; }
.widget-badge:hover { text-decoration:underline; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { background:#0d1528; padding:10px 16px; text-align:left; font-size:11px; color:#94a3b8; text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
td { padding:10px 16px; border-top:1px solid #152040; }
tr:hover { background:rgba(74,143,231,0.05); }
.ticker { font-weight:700; color:#4a8fe7; }
.neg { color:#ef4444; }
.widget-footer { padding:12px 20px; background:#0d1528; border-top:1px solid #152040; text-align:center; }
.widget-footer a { color:#4a8fe7; font-size:11px; text-decoration:none; font-weight:600; }
.widget-footer a:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="widget">
  <div class="widget-header">
    <span class="widget-title">🔥 Most Shorted Stocks</span>
    <a href="https://westmountfundamentals.com/short-interest/" target="_blank" class="widget-badge">Westmount Fundamentals</a>
  </div>
  <table>
    <thead>
      <tr><th>Ticker</th><th>Company</th><th>Short %</th><th>Days to Cover</th></tr>
    </thead>
    <tbody id="data"></tbody>
  </table>
  <div class="widget-footer">
    <a href="https://westmountfundamentals.com/short-interest/" target="_blank">View all 76 stocks →</a>
  </div>
</div>
<script>
const stocks = [
  { ticker: 'BYON', name: 'Beyond Inc', shortPct: 42.1, dtc: 8.2 },
  { ticker: 'UPST', name: 'Upstart Holdings', shortPct: 38.7, dtc: 4.5 },
  { ticker: 'CVNA', name: 'Carvana', shortPct: 35.2, dtc: 3.8 },
  { ticker: 'MSTR', name: 'MicroStrategy', shortPct: 32.9, dtc: 2.1 },
  { ticker: 'FFIE', name: 'Faraday Future', shortPct: 31.4, dtc: 1.2 },
  { ticker: 'BLNK', name: 'Blink Charging', shortPct: 28.8, dtc: 5.7 },
  { ticker: 'PLUG', name: 'Plug Power', shortPct: 27.3, dtc: 3.4 },
  { ticker: 'RIOT', name: 'Riot Platforms', shortPct: 26.1, dtc: 2.9 },
  { ticker: 'SPCE', name: 'Virgin Galactic', shortPct: 25.7, dtc: 6.1 },
  { ticker: 'LAZR', name: 'Luminar Tech', shortPct: 24.9, dtc: 4.3 },
];
const tbody = document.getElementById('data');
stocks.forEach(s => {
  const tr = document.createElement('tr');
  tr.innerHTML = '<td class="ticker">'+s.ticker+'</td><td>'+s.name+'</td><td class="neg">'+s.shortPct+'%</td><td>'+s.dtc+'</td>';
  tbody.appendChild(tr);
});
</script>
</body>
</html>
